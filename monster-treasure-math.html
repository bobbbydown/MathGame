    function renderPause() {
      return `
        <div class="screen split">
          <div class="card">
            <h2 class="panel-title">Pause</h2>
            <p class="panel-sub">Take a break or change settings.</p>
            <div class="btn-grid">
              <button class="btn" onclick="setScreen('map')">🗺️ Back to Map</button>
              <button class="btn secondary" onclick="openParentPanel()">🧑 Parent Panel</button>
              <button class="btn ghost" onclick="toggleSetting('soundOn')">${gameState.settings.soundOn ? '🔊 Sound On' : '🔈 Sound Off'}</button>
              <button class="btn ghost" onclick="toggleSetting('reduceMotion')">${gameState.settings.reduceMotion ? '🌙 Reduce Motion' : '✨ Full Motion'}</button>

            </div>
          </div>
          <div class="light-card center" style="flex-direction:column; gap:10px;">
            <div class="monster-token"><div class="emoji">😴</div><div class="name">Rest Time</div></div>
            <div class="muted">Your progress is saved automatically.</div>
            <div class="muted" style="font-size:13px;text-align:center;">Quitting to title keeps all your stars, badges, and unlocked stages.</div>
          </div>
        </div>

    function renderGameOver() {
      return `
        <div class="screen split">
          <div class="card center" style="flex-direction:column; text-align:center;">
            <div style="font-size:58px;">💖</div>
            <h2 class="panel-title">Out of hearts</h2>
            <p class="panel-sub">That\'s okay. You still keep your stars, badges, pets, and unlocked map progress.</p>
            <div class="footer-actions"><button class="btn" onclick="replayFromMap()">🔁 Refill Hearts</button><button class="btn secondary" onclick="openParentPanel()">🧑 Parent Panel</button></div>
          </div>
          <div class="light-card">
            <h3 class="panel-title">Progress kept</h3>
            <div class="list">
              <div class="list-item">Stars: <strong>${gameState.player.stars}</strong></div>
              <div class="list-item">Badges: <strong>${gameState.player.badges.length}</strong></div>
              <div class="list-item">Pets: <strong>${gameState.player.pets.length}</strong></div>
              <div class="list-item">Highest stage: <strong>${Math.max(...gameState.player.unlockedStages)}</strong></div>
            </div>
          </div>
        </div>
      `;

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function render() {
      const app = document.getElementById('app');
      let html = '';
      switch (gameState.screen) {
        case 'title': html = renderTitle(); break;
        case 'modeSelect': html = renderModeSelect(); break;
        case 'profile': html = renderProfile(); break;
        case 'map': html = renderMap(); break;
        case 'stageIntro': html = renderStageIntro(); break;
        case 'battle': html = renderBattle(); break;
        case 'petCelebration': html = renderPetCelebration(); break;
        case 'reward': html = renderReward(); break;
        case 'parentPanel': html = renderParentPanel(); break;
        case 'pause': html = renderPause(); break;
        case 'gameOver': html = renderGameOver(); break;
        default: html = renderTitle();
      }
      app.innerHTML = html;
      saveGame();
    }

    window.setScreen = setScreen;
    window.startGame = startGame;
    window.continueFromProfile = continueFromProfile;
    window.startStage = startStage;
    window.launchBattle = launchBattle;
    window.checkAnswer = checkAnswer;
    window.submitTypedAnswer = submitTypedAnswer;
    window.openParentPanel = openParentPanel;
    window.toggleSetting = toggleSetting;
    window.resetProgress = resetProgress;
    window.continueAfterReward = continueAfterReward;
    window.replayFromMap = replayFromMap;
    window.saveGame = saveGame;

    render();
  </script>
</body>
</html>
